<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    /* ==========================================================================
       CORE VARIABLES & RESET
       ========================================================================== */
    :root {
      --gold-light: #f6d793;
      --gold-mid: #e5c07b;
      --gold-dark: #b38f43;
      --bg-pitch: #030305;
      --glass-bg: rgba(15, 15, 20, 0.7);
      --glass-border: rgba(229, 192, 123, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-pitch);
      font-family: 'Times New Roman', Times, serif;
      min-height: 100vh;
      color: #ffffff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ==========================================================================
       AESTHETIC BACKGROUNDS
       ========================================================================== */
    .bg-grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(229, 192, 123, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(229, 192, 123, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
      z-index: 1;
      pointer-events: none;
    }

    .ambient-glow-1 {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 900px;
      height: 600px;
      background: radial-gradient(circle, rgba(229, 192, 123, 0.12) 0%, transparent 70%);
      filter: blur(100px);
      z-index: 0;
      pointer-events: none;
    }

    /* ==========================================================================
       PREMIUM NAVBAR
       ========================================================================== */
    .premium-nav-container {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1400px;
      z-index: 1000;
    }

    .premium-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 2px;
    }

    .logo span {
      background: linear-gradient(135deg, #fff, var(--gold-mid));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 35px;
      list-style: none;
    }

    .nav-item a {
      text-decoration: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .nav-item a:hover {
      color: var(--gold-mid);
      text-shadow: 0 0 12px rgba(229, 192, 123, 0.4);
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .menu-toggle .bar {
      width: 25px;
      height: 2px;
      background-color: #ffffff;
      transition: all 0.3s ease;
    }

    /* ==========================================================================
       ERROR CONTENT AREA
       ========================================================================== */
    .error-container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 600px;
      padding: 40px 20px;
      margin-top: 100px;
    }

    .error-code {
      font-size: clamp(120px, 15vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 30%, var(--gold-mid), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -4px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 30px rgba(229, 192, 123, 0.15));
    }

    .error-title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 16px;
    }

    .error-description {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .btn-home {
      display: inline-block;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--bg-pitch);
      background: linear-gradient(135deg, #ffffff, var(--gold-mid));
      padding: 16px 35px;
      border-radius: 50px;
      box-shadow: 0 0 25px rgba(229, 192, 123, 0.3);
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 35px rgba(229, 192, 123, 0.5);
      background: linear-gradient(135deg, var(--gold-light), var(--gold-mid));
    }

    /* ==========================================================================
       RESPONSIVE MEDIA QUERIES
       ========================================================================== */
    @media screen and (max-width: 992px) {
      .premium-navbar {
        padding: 14px 24px;
        border-radius: 30px;
      }

      .menu-toggle {
        display: flex;
      }

      .nav-menu {
        position: absolute;
        top: 80px;
        left: 0;
        width: 100%;
        background: rgba(15, 15, 20, 0.95);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        flex-direction: column;
        padding: 30px 20px;
        gap: 20px;
        transform: translateY(-20px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.4s ease;
      }

      .nav-menu.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .nav-item {
        width: 100%;
      }

      .nav-item a {
        display: block;
        font-size: 15px;
        padding: 10px 0;
      }

      .menu-toggle.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); background-color: var(--gold-mid); }
      .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
      .menu-toggle.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background-color: var(--gold-mid); }
    }
  </style>
</head>
<body>

  <!-- Background Grids & Glows -->
  <div class="bg-grid-overlay"></div>
  <div class="ambient-glow-1"></div>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title"> Something Went Wrong</h1>
    <p class="error-description">
    please go back to home page!
    </p>
    <a href="{{url_for('root')}}" class="btn-home">Back to Safety</a>
  </div>
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.getElementById('navMenu');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      navMenu.classList.toggle('open');
    });
  </script>

</body>
</html>
